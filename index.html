    <style>
        :root {
            --madison-green: #006847; /* Kelly Green */
            --madison-gold: #FFD700;  /* Yellow Gold */
            --dark-accent: #1a1a1a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            /* Updated background to use the provided image */
            background: url('Gemini_Generated_Image_h3kiiih3kiiih3ki.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .welcome-card {
            /* Kept the white background so the text remains easy to read over the new background image */
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border-top: 6px solid var(--madison-green);
        }

        .hero-logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--dark-accent);
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        p {
            color: #555;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .launch-btn {
            display: inline-block;
            text-decoration: none;
            background: var(--madison-green);
            color: white;
            padding: 16px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(0, 104, 71, 0.2);
        }

        .launch-btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
            box-shadow: 0 6px 12px rgba(0, 104, 71, 0.3);
        }

        .footer-text {
            margin-top: 40px;
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }
    </style>
